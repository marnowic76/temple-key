<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0a0705;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-width: 100vw;
    font-family: 'Press Start 2P', monospace;
  }

  #gameWrapper {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #gameCanvas {
    border: 2px solid #5a3e1b;
    box-shadow: 0 0 30px #c9a84c22;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    touch-action: none;
    max-width: 100vw;
    max-height: 100vh;
  }

  /* ── TOUCH CONTROLS ── */
  /* ── NEW LANDSCAPE LAYOUT ── */
  /* gameWrapper in landscape: canvas center, controls on sides */
  #touchControls {
    display: none; /* hidden by default, shown on touch devices */
    pointer-events: none;
  }

  /* Left joystick zone */
  #joystickZone {
    position: fixed;
    left: 0; top: 0;
    width: 150px; height: 100vh;
    pointer-events: all;
    touch-action: none;
    z-index: 10;
  }
  #joystickBase {
    position: absolute;
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.25);
    background: rgba(201,168,76,0.06);
    left: 20px; bottom: 40px;
    pointer-events: none;
  }
  #joystickKnob {
    position: absolute;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: rgba(201,168,76,0.35);
    border: 2px solid rgba(201,168,76,0.7);
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: none;
  }

  /* Right action zone */
  #actionZone {
    position: fixed;
    right: 0; top: 0;
    width: 150px; height: 100vh;
    pointer-events: all;
    touch-action: none;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .action-btn {
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 2px solid rgba(201,168,76,0.5);
    background: rgba(201,168,76,0.12);
    color: #c9a84c;
    font-family: 'Press Start 2P', monospace;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: all;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    user-select: none;
  }
  .action-btn:active, .action-btn.pressed {
    background: rgba(201,168,76,0.4);
    border-color: rgba(201,168,76,1);
  }
  .action-btn .btn-icon { font-size: 22px; line-height: 1; }
  .action-btn .btn-lbl  { font-size: 6px; color: #c9a84c99; margin-top: 3px; }

  #btn-chisel { border-color: rgba(80,200,80,0.5); background: rgba(80,200,80,0.1); }
  #btn-chisel:active, #btn-chisel.pressed { background: rgba(80,200,80,0.4); }
  #btn-whip2  { border-color: rgba(201,168,76,0.5); }

  /* Only show on touch devices */
  @media (hover: hover) and (pointer: fine) {
    #joystickZone { display: none; }
    #actionZone   { display: none; }
  }
  @media (hover: none) {
    #touchControls { display: block; }
  }

  .btn-label { font-size:5px; color:#c9a84c99; }

  #hud { display:none; }
  #controls { display:none; }
  #title { display:none; }
  #version { display:none; }

// ─── AUDIO SYSTEM (Web Audio API) ────────────────────────────────

function playTone(freq, type, duration, volume, attack, decay) {
  if (!audioCtx || audioCtx.state !== 'running') return;
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(volume || 0.15, ac.currentTime + (attack || 0.01));
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + (decay || duration || 0.1));
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + (duration || 0.1));
  } catch(e) {}
}

function playNoise(duration, volume, highpass) {
  if (!audioCtx || audioCtx.state !== 'running') return;
  try {
    const ac = getAudio();
    const bufSize = ac.sampleRate * duration;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = highpass ? 'highpass' : 'lowpass';
    filter.frequency.value = highpass || 800;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(volume || 0.1, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ac.destination);
    src.start();
    src.stop(ac.currentTime + duration);
  } catch(e) {}
}

function sfxWhip() {
  // Bicz – krótki sweep w dół + trzask
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(120, ac.currentTime + 0.12);
    gain.gain.setValueAtTime(0.18, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    osc.start(); osc.stop(ac.currentTime + 0.15);
    // Trzask
    playNoise(0.06, 0.12, 3000);
  } catch(e) {}
}

function updateAmbientSounds() {
  if (!audioCtx || audioCtx.state !== 'running') return;
  if (playerDead || levelComplete) return;

  // Pochodnie – co ~90 klatek
  torchSoundTimer++;
  if (torchSoundTimer > 85 + Math.floor(Math.random()*30)) {
    sfxTorchCrackle();
    torchSoundTimer = 0;
  }

  // Kwas ~ – co ~120 klatek jeśli jest na mapie
  acidSoundTimer++;
  if (acidSoundTimer > 110 + Math.floor(Math.random()*40)) {
    const hasAcid = tileMap.some(row => row.includes('~'));
    if (hasAcid) sfxAcidDrip();
    acidSoundTimer = 0;
  }

  // Mummy groan – every ~180 frames
  mummySoundTimer++;
  if (mummySoundTimer > 170 + Math.floor(Math.random()*60)) {
    const hasMummy = enemies.some(e => e.type === 'mummy' && e.stunTimer === 0);
    if (hasMummy) sfxMummyGroan();
    mummySoundTimer = 0;
  }

  // Scarab – every ~150 frames
  scarabSoundTimer++;
  if (scarabSoundTimer > 140 + Math.floor(Math.random()*50)) {
    const hasScarab = enemies.some(e => e.type === 'scarab' && e.stunTimer === 0);
    if (hasScarab) sfxScarabChitter();
    scarabSoundTimer = 0;
  }

  // Dizzy – co ~60 klatek gdy ktoś ogłuszony
  dizzyTimer++;
  if (dizzyTimer > 55) {
    const hasStunned = enemies.some(e => e.stunTimer > 0 && !e.ghost);
    if (hasStunned) sfxDizzy();
    // Ghost howl
    const hasGhost = enemies.some(e => e.ghost);
    if (hasGhost) {
      try {
        const ac = getAudio();
        if (ac.state === 'running') {
          const osc = ac.createOscillator(), g = ac.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(220 + Math.random()*80, ac.currentTime);
          osc.frequency.linearRampToValueAtTime(160, ac.currentTime + 0.3);
          g.gain.setValueAtTime(0.06, ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
          osc.connect(g); g.connect(ac.destination);
          osc.start(); osc.stop(ac.currentTime + 0.4);
        }
      } catch(e2) {}
    }
    dizzyTimer = 0;
  }
}

let currentLevel = 0;

const HIGH_SCORES_KEY = 'templeKeyHighScores_v1';
let highScores   = [];
let gameOver     = false;

let tempInitials = '';
let gameOverTimer = 0;
let showLevelBanner = false;
let levelBannerTimer = 0;

const mapTemplate = LEVELS[0].map;

// 2D array – pozwala modyfikować bloki w runtime
let tileMap = mapTemplate.map(row => row.split(''));

// Blocks placed by player
let playerBlocks = new Set(); // "col,row"

// ─── WROGOWIE ─────────────────────────────────────────────────────
let enemies = [];

let idolCollected = false;
let levelComplete = false;

let journalFound = false;
let journalMsg = '';
let journalMsgTimer = 0;
let journalTileX = 0;
let journalTileY = 0;
let levelFinishTime = 0;
let onboardingTimer = 300; // 5 sekund na starcie

// ─── PIASEK & KOLUMNY ─────────────────────────────────────────────
let fallingColumns = [];
let screenShake = { x: 0, y: 0, intensity: 0, duration: 0 };

function addShake(intensity, duration) {
  screenShake.intensity = Math.max(screenShake.intensity, intensity);
  screenShake.duration = Math.max(screenShake.duration, duration);
}

function updateShake() {
  if (screenShake.duration > 0) {
    screenShake.duration--;
    const i = screenShake.intensity * (screenShake.duration / 10);
    screenShake.x = (Math.random() - 0.5) * i;
    screenShake.y = (Math.random() - 0.5) * i;
    if (screenShake.duration <= 0) {
      screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0;
    }
  }
}

function initEnemies() {
  enemies = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = tileMap[r][c];
      if (t === 'M') {
        enemies.push({
          type: 'mummy',
          x: c * T, y: r * T,
          startX: c * T,
          w: 20, h: 24,
          velX: 1.2, velY: 0,
          dir: 1,
          grounded: false,
          stunTimer: 0,
          col: c, row: r,
        });
        tileMap[r][c] = '.'; // usuń z mapy – rysujemy dynamicznie
      }
      if (t === 'B') {
        enemies.push({
          type: 'scarab',
          x: c * T + 2, y: r * T,
          w: 20, h: 32,
          velX: 0, velY: 0,
          dir: 1,
          grounded: false,
          jumpTimer: 80 + Math.floor(Math.random() * 60),
          stunTimer: 0,
          col: c, row: r,
        });
        tileMap[r][c] = '.';
      }
      if (t === 'S' && !playerStartX) {
        playerStartX = c * T + 4;
        playerStartY = r * T - 4;
      }
    }
  }
}

function resetLevel(fullReset) {
  playerDead = false;
  deathTimer = 0;

  if (fullReset) {
    currentLevel = 0;
    playerLives  = 5;
    totalScore   = 0;
    score        = 0;
  }

  // Load correct level map
  const lvl = LEVELS[currentLevel];
  tileMap = lvl.map.map(row => row.split(''));
  playerBlocks = new Set();
  player.velX = 0;
  player.velY = 0;
  player.grounded = false;
  player.swinging = false;
  player.whipActive = false;
  player.blocksPlaced = 0;
  blockCountEl.textContent = 0;
  idolCollected = false;
  levelComplete = false;
  levelCompleteTimer = 0;
  levelStartTime = Date.now();
  enemiesKilled = 0;
  if (fullReset) { score = 0; }
  scorePopups = [];
  journalFound = false;
  journalMsg = '';
  journalMsgTimer = 0;
  journalTileX = 0;
  journalTileY = 0;
  levelFinishTime = 0;
  onboardingTimer = 0;
  fallingColumns = [];

  // Find S (start) in map
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tileMap[r][c] === 'S') {
        playerStartX = c * T + 4;
        playerStartY = r * T;
        tileMap[r][c] = '.';
      }
    }
  }
  player.x = playerStartX;
  player.y = playerStartY;

  initEnemies();
  showLevelBanner = true;
  levelBannerTimer = 180;
}

function updateEnemies() {
  for (const e of enemies) {

    // ── GHOST: fly straight at player, ignore walls ──
    if (e.ghost) {
      const dx = (player.x + player.w/2) - (e.x + e.w/2);
      const dy = (player.y + player.h/2) - (e.y + e.h/2);
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const speed = 0.67; // 1.2 * 0.7 * 0.8 = -44%
      e.x += (dx / dist) * speed;
      e.y += (dy / dist) * speed;

      // Kill player on contact
      if (!playerDead) {
        const overlap = e.x < player.x + player.w - 4 &&
                        e.x + e.w > player.x + 4 &&
                        e.y < player.y + player.h - 4 &&
                        e.y + e.h > player.y + 4;
        if (overlap) killPlayer();
      }
      continue;
    }

    // Grawitacja
    e.velY += GRAVITY;
    if (e.velY > 12) e.velY = 12;

    // Stunned – stand still
    if (e.stunTimer > 0) { e.stunTimer--; continue; }

    // ── MUMIA: patrol ──
    if (e.type === 'mummy') {
      e.x += e.velX * e.dir;

      // Ruch Y
      e.grounded = false;
      const stepY = Math.sign(e.velY);
      const stepsY = Math.ceil(Math.abs(e.velY));
      for (let i = 0; i < stepsY; i++) {
        const ny = e.y + stepY;
        if (!enemyCollides(e, e.x, ny)) e.y = ny;
        else { if (e.velY > 0) e.grounded = true; e.velY = 0; break; }
      }

      // Odwróć przy ścianie lub krawędzi
      if (enemyCollides(e, e.x + e.velX * e.dir * 2, e.y)) {
        e.dir *= -1;
      }
      // Odwróć przy krawędzi platformy
      const edgeCol = Math.floor((e.x + (e.dir > 0 ? e.w + 2 : -2)) / T);
      const edgeRow = Math.floor((e.y + e.h + 4) / T);
      if (edgeRow < ROWS && (tileMap[edgeRow][edgeCol] === '.' || tileMap[edgeRow][edgeCol] === undefined)) {
        e.dir *= -1;
      }
    }

    // ── SKARABEUSZ: skacze w stronę gracza ──
    if (e.type === 'scarab') {
      e.x += e.velX;
      e.velX *= 0.88;

      e.grounded = false;
      const stepY = Math.sign(e.velY);
      const stepsY = Math.ceil(Math.abs(e.velY));
      for (let i = 0; i < stepsY; i++) {
        const ny = e.y + stepY;
        if (!enemyCollides(e, e.x, ny)) e.y = ny;
        else { if (e.velY > 0) e.grounded = true; e.velY = 0; break; }
      }

      e.jumpTimer--;
      if (e.jumpTimer <= 0 && e.grounded) {
        // Skok w stronę gracza
        const pdx = (player.x + player.w/2) - (e.x + e.w/2);
        e.velX = Math.sign(pdx) * 3.5;
        e.velY = -7;
        e.grounded = false;
        e.jumpTimer = 90 + Math.floor(Math.random() * 60);
        spawnParticles(e.x + e.w/2, e.y, '#3a8aaa', 5);
      }
    }
  }
}

function enemyCollides(e, ex, ey) {
  const l = Math.floor(ex / T);
  const r = Math.floor((ex + e.w - 1) / T);
  const t = Math.floor(ey / T);
  const b = Math.floor((ey + e.h - 1) / T);
  for (let row = t; row <= b; row++) {
    for (let col = l; col <= r; col++) {
      if (isSolid(col, row)) return true;
    }
  }
  return false;
}

function checkPlayerHit() {
  if (playerDead) return;
  const px1 = player.x, px2 = player.x + player.w;
  const py1 = player.y, py2 = player.y + player.h;

  // Kolce
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tileMap[r][c] === '^') {
        const tx = c * T, ty = r * T;
        if (px2 > tx + 4 && px1 < tx + T - 4 && py2 > ty + 8 && py1 < ty + T) {
          killPlayer();
          return;
        }
      }
    }
  }

  // Wrogowie
  for (const e of enemies) {
    if (px2 > e.x + 3 && px1 < e.x + e.w - 3 &&
        py2 > e.y + 3 && py1 < e.y + e.h - 3) {
      killPlayer();
      return;
    }
  }
}

function killPlayer() {
  if (playerDead) return;
  playerDead = true;
  deathTimer = 90;
  playerLives--;
  sfxDeath();
  addShake(6, 20);
  levelFinishTime = Date.now();
  if (playerLives <= 0) {
    gameOver     = true;
    enteringName = true;
    tempInitials = '';
    gameOverTimer = 0;
  }
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#e05c3a', 20);
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#f0d060', 12);
  showAction('YOU DIED!', '#e05c3a');
}

function drawEnemies() {
  for (const e of enemies) {
    const x = Math.round(e.x);
    const y = Math.round(e.y);

    // ── Draw ghost ──
    if (e.ghost) {
      const x2 = Math.round(e.x), y2 = Math.round(e.y);
      const t2 = Date.now() * 0.004;
      const bob = Math.sin(t2 + e.x * 0.1) * 3;
      const hp = e.ghostHP || 3;
      const col = hp === 3 ? '#6666ff' : hp === 2 ? '#9966ff' : '#ff44ff';

      ctx.save();
      ctx.globalAlpha = 0.7 + Math.sin(t2*2) * 0.15;

      // Ghost body – rounded blob
      const grad = ctx.createRadialGradient(x2+e.w/2, y2+e.h/2+bob, 2, x2+e.w/2, y2+e.h/2+bob, e.w*0.8);
      grad.addColorStop(0, '#ffffff88');
      grad.addColorStop(0.4, col + 'aa');
      grad.addColorStop(1, col + '22');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(x2+e.w/2, y2+e.h/2+bob, e.w*0.6, e.h*0.55, 0, 0, Math.PI*2);
      ctx.fill();

      // Wavy bottom
      ctx.fillStyle = col + '66';
      ctx.beginPath();
      ctx.moveTo(x2+2, y2+e.h+bob);
      for (let wx = 0; wx <= e.w-4; wx += 4) {
        ctx.lineTo(x2+2+wx, y2+e.h+bob + Math.sin(t2*3+wx*0.5)*3);
      }
      ctx.lineTo(x2+e.w-2, y2+e.h/2+bob);
      ctx.closePath();
      ctx.fill();

      // Eyes – red glowing
      ctx.fillStyle = '#ff2222';
      ctx.beginPath(); ctx.arc(x2+e.w/2-5, y2+e.h/2-2+bob, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x2+e.w/2+5, y2+e.h/2-2+bob, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff8888';
      ctx.beginPath(); ctx.arc(x2+e.w/2-5, y2+e.h/2-2+bob, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x2+e.w/2+5, y2+e.h/2-2+bob, 1.5, 0, Math.PI*2); ctx.fill();

      // HP dots above
      for (let h2=0; h2<3; h2++) {
        ctx.fillStyle = h2 < hp ? '#cc88ff' : '#333333';
        ctx.beginPath();
        ctx.arc(x2+e.w/2 - 8 + h2*8, y2+bob-10, 3, 0, Math.PI*2);
        ctx.fill();
      }

      // Trail
      ctx.fillStyle = col + '33';
      ctx.beginPath();
      ctx.ellipse(x2+e.w/2, y2+e.h+bob+4, e.w*0.3, 4, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();
      continue;
    }

    ctx.save();
    // Stun – blinking
    const isBlink = e.stunTimer > 0 && Math.floor(e.stunTimer / 6) % 2 === 0;
    if (isBlink) {
      ctx.restore();
      drawStunStars(e); // rysuj tylko gwiazdki gdy miga
      continue;
    }
    if (e.stunTimer > 0) {
      ctx.globalAlpha = 0.75;
      ctx.fillStyle = '#4488ff22';
      ctx.fillRect(x - 2, y - 8, e.w + 4, e.h + 8);
    }
    if (e.type === 'mummy') {
      const flip = e.dir < 0;
      if (flip) { ctx.scale(-1,1); ctx.translate(-canvas.width, 0); }
      const px = flip ? canvas.width - x - e.w : x;
      const walkAnim = Math.sin(Date.now() * 0.008) * 1.5;

      const my = y - 6; // podnieś mumię o 6px
      // Shadow
      ctx.fillStyle = '#00000033';
      ctx.beginPath();
      ctx.ellipse(px + e.w/2, my + e.h + 2, 8, 3, 0, 0, Math.PI*2);
      ctx.fill();

      // Legs (walking)
      const legL = walkAnim;
      const legR = -walkAnim;
      ctx.fillStyle = '#b8a882';
      ctx.fillRect(px + 2,  my + e.h - 10 + legL, 6, 11);
      ctx.fillRect(px + 11, my + e.h - 10 + legR, 6, 11);
      // Feet
      ctx.fillStyle = '#a89870';
      ctx.fillRect(px + 1,  my + e.h - 1 + legL, 8, 3);
      ctx.fillRect(px + 10, my + e.h - 1 + legR, 8, 3);

      // Tors – owinięty bandażami
      const bodyGrad = ctx.createLinearGradient(px, my+8, px+e.w, my+8);
      bodyGrad.addColorStop(0, '#c8b890');
      bodyGrad.addColorStop(0.5, '#e8d8b0');
      bodyGrad.addColorStop(1, '#b8a880');
      ctx.fillStyle = bodyGrad;
      ctx.fillRect(px + 2, my + 12, e.w - 4, e.h - 22);

      // Arms outstretched (zombie style)
      ctx.fillStyle = '#c0b088';
      ctx.fillRect(px - 4, my + 13, 7, 5);
      ctx.fillRect(px + e.w - 3, my + 13, 7, 5);
      ctx.fillStyle = '#b0a078';
      ctx.fillRect(px - 5, my + 15, 4, 3);
      ctx.fillRect(px + e.w, my + 15, 4, 3);

      // Horizontal bandages on torso
      ctx.strokeStyle = '#f0e0c055';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(px + 2, my + 14 + i * 5);
        ctx.lineTo(px + e.w - 2, my + 14 + i * 5);
        ctx.stroke();
      }
      // Diagonal bandages
      ctx.strokeStyle = '#e0d0a033';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px + 2, my + 12);
      ctx.lineTo(px + e.w - 2, my + e.h - 12);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(px + e.w - 2, my + 12);
      ctx.lineTo(px + 2, my + e.h - 12);
      ctx.stroke();

      // Head
      ctx.fillStyle = '#d0c098';
      ctx.fillRect(px + 4, my + 1, e.w - 8, 12);
      // Bandaż na głowie
      ctx.fillStyle = '#e8d8a8';
      ctx.fillRect(px + 3, my + 3, e.w - 6, 4);
      ctx.fillRect(px + 4, my + 1, e.w - 8, 2);
      // Usta
      ctx.fillStyle = '#b09870';
      ctx.fillRect(px + 5, my + 9, e.w - 10, 3);

      // Oczy
      const eyeGlow = 0.7 + Math.sin(Date.now() * 0.003) * 0.3;
      ctx.globalAlpha = eyeGlow;
      ctx.fillStyle = '#ff2200';
      ctx.fillRect(px + 4,  my + 3, 4, 4);
      ctx.fillRect(px + 11, my + 3, 4, 4);
      ctx.fillStyle = '#ff6644';
      ctx.fillRect(px + 5,  my + 4, 2, 2);
      ctx.fillRect(px + 12, my + 4, 2, 2);
      ctx.globalAlpha = 1;
    }

    if (e.type === 'scarab') {
      const bx = x + e.w/2;
      const by = y + e.h/2 - 4; // podnieś skarabeusza o 6px
      // Nogi
      ctx.strokeStyle = '#1a3a1a';
      ctx.lineWidth = 1.5;
      const legPairs = [[-1,-4],[-1,0],[-1,4],[1,-4],[1,0],[1,4]];
      legPairs.forEach(([side, oy], idx) => {
        const anim = Math.sin(Date.now()*0.015 + idx) * 2;
        ctx.beginPath();
        ctx.moveTo(bx + side*8, by + oy);
        ctx.quadraticCurveTo(bx+side*12, by+oy, bx+side*15, by+oy+5+anim*side);
        ctx.stroke();
      });
      // Abdomen
      const ag = ctx.createRadialGradient(bx-2,by,1,bx,by+2,10);
      ag.addColorStop(0,'#4a8a30'); ag.addColorStop(0.6,'#2a6018'); ag.addColorStop(1,'#0a2008');
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.ellipse(bx,by+2,9,7,0,0,Math.PI*2); ctx.fill();
      // Wing covers
      ctx.fillStyle='#3a7828';
      ctx.beginPath(); ctx.ellipse(bx-3,by+1,4,6,-0.15,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bx+3,by+1,4,6,0.15,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#88cc5033';
      ctx.beginPath(); ctx.ellipse(bx-4,by-1,2,3,-0.3,0,Math.PI*2); ctx.fill();
      // Linia środkowa
      ctx.strokeStyle='#1a4010'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(bx,by-5); ctx.lineTo(bx,by+9); ctx.stroke();
      // Head
      ctx.fillStyle='#2a6018';
      ctx.beginPath(); ctx.ellipse(bx,by-6,5,4,0,0,Math.PI*2); ctx.fill();
      // Oczy
      ctx.fillStyle='#cc2200';
      ctx.fillRect(bx-4,by-9,3,3); ctx.fillRect(bx+1,by-9,3,3);
      ctx.fillStyle='#ff4422';
      ctx.fillRect(bx-3,by-9,1,1); ctx.fillRect(bx+2,by-9,1,1);
      // Antennae
      ctx.strokeStyle='#1a3a10'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(bx-2,by-10); ctx.quadraticCurveTo(bx-6,by-15,bx-4,by-18); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx+2,by-10); ctx.quadraticCurveTo(bx+6,by-15,bx+4,by-18); ctx.stroke();
      ctx.fillStyle='#2a6018';
      ctx.beginPath(); ctx.arc(bx-4,by-18,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx+4,by-18,2,0,Math.PI*2); ctx.fill();
    }

    ctx.restore();
    // Draw stun stars after enemy (outside save/restore)
    if (e.stunTimer > 0 && !isBlink) drawStunStars(e);
  }
}

function drawDeathScreen() {
  if (!playerDead || gameOver) return;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  // Czerwona poświata
  ctx.save();
  ctx.globalAlpha = 0.45 * (deathTimer / 90);
  ctx.fillStyle = '#8b0000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();

  // Napis
  const alpha = Math.min(1, (90 - deathTimer) / 20);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#00000088';
  ctx.fillRect(canvas.width/2 - 110, canvas.height/2 - 24, 220, 48);
  ctx.fillStyle = '#e05c3a';
  ctx.font = '12px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('YOU DIED!', canvas.width/2, canvas.height/2);
  ctx.fillStyle = '#c9a84c';
  ctx.font = '6px "Press Start 2P"';
  ctx.fillText(playerLives <= 0 ? 'GAME OVER...' : 'RESETTING...', canvas.width/2, canvas.height/2 + 18);
  ctx.textAlign = 'left';
  ctx.restore();
}
